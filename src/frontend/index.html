<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:*;">
  <title>Plataforma Gestión Escolar - SavaterSi</title>
  <link rel="stylesheet" href="./assets/css/output.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-brand-600 rounded-full flex items-center justify-center text-white font-bold text-xl">S
        </div>
        <h1 class="text-2xl font-bold leading-tight text-gray-900">SavaterSi</h1>
      </div>
      <nav>
        <button id="btnLogin"
          class="px-4 py-2 bg-brand-600 text-white rounded-md hover:bg-brand-700 transition-colors shadow-sm font-medium">Iniciar
          Sesión</button>
      </nav>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">

    <div class="mb-6 flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
      <div>
        <h2 class="text-2xl font-bold text-gray-900">Planilla de Calificaciones</h2>
        <p class="text-sm text-gray-500">Módulo 5 - Panel Docente (Soporta Offline)</p>
      </div>

      <div id="statusIndicator"
        class="px-4 py-2 rounded-lg bg-gray-50 border border-gray-200 flex items-center gap-2 text-sm font-medium text-gray-600 transition-colors">
        <span class="w-3 h-3 rounded-full bg-gray-400 animate-pulse"></span>
        Conectando...
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
      <!-- Toolbar -->
      <div class="border-b border-gray-200 p-4 bg-gray-50 flex items-center justify-between">
        <div class="flex gap-4">
          <select
            class="form-select block w-48 rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm">
            <option>Grado 6A</option>
            <option>Grado 7B</option>
          </select>
          <select
            class="form-select block w-48 rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm">
            <option>Matemáticas</option>
            <option>Biología</option>
          </select>
        </div>
        <button id="btnSync"
          class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm text-sm font-medium flex items-center gap-2 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
            </path>
          </svg>
          Sincronizar Datos
        </button>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                Estudiante</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                Nota 1 (30%)</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                Nota 2 (30%)</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                Acumulativo (40%)</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                Acción</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200" id="studentsTableBody">
            <!-- Filas de Estudiantes (Simuladas por ahora) -->
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Perez, Juan</td>
              <td class="px-6 py-4 whitespace-nowrap"><input type="number" step="0.1" min="0" max="5"
                  class="nota-input block w-20 rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm text-center"
                  value="4.5"></td>
              <td class="px-6 py-4 whitespace-nowrap"><input type="number" step="0.1" min="0" max="5"
                  class="nota-input block w-20 rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm text-center">
              </td>
              <td class="px-6 py-4 whitespace-nowrap"><input type="number" step="0.1" min="0" max="5"
                  class="nota-input block w-20 rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm text-center">
              </td>
              <td class="px-6 py-4 whitespace-nowrap"><button
                  class="btn-save-note text-brand-600 hover:text-brand-900 font-medium text-sm"
                  data-student="1">Guardar</button></td>
            </tr>
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">Gomez, Maria</td>
              <td class="px-6 py-4 whitespace-nowrap"><input type="number" step="0.1" min="0" max="5"
                  class="nota-input block w-20 rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm text-center">
              </td>
              <td class="px-6 py-4 whitespace-nowrap"><input type="number" step="0.1" min="0" max="5"
                  class="nota-input block w-20 rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm text-center">
              </td>
              <td class="px-6 py-4 whitespace-nowrap"><input type="number" step="0.1" min="0" max="5"
                  class="nota-input block w-20 rounded-md border-gray-300 shadow-sm focus:border-brand-500 focus:ring-brand-500 sm:text-sm text-center">
              </td>
              <td class="px-6 py-4 whitespace-nowrap"><button
                  class="btn-save-note text-brand-600 hover:text-brand-900 font-medium text-sm"
                  data-student="2">Guardar</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t border-gray-200 mt-auto py-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
      &copy; 2026 SavaterSi. Arquitectura Híbrida Multiplataforma.
    </div>
  </footer>

  <script src="./assets/js/app.js"></script>
</body>

</html>
